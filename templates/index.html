<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon/favicon-16x16.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>PDF Editor</h1>
            <p>Effortlessly upload, reorder, merge, and delete PDF pages.</p>
        </header>

        <main>
            <!-- 初期状態のアップロード領域 -->
            <div id="upload-section" class="upload-section">
                <div id="drop-zone" class="drop-zone">
                    <div class="upload-icon">📄</div>
                    <p class="drop-title">Drop your PDF files here</p>
                    <p class="sub-text">or</p>
                    <button id="select-file-btn" class="btn primary-btn">Select PDF Files</button>
                    <!-- 非表示のファイルインプット -->
                    <input type="file" id="pdf-input" accept=".pdf" multiple>
                </div>
            </div>

            <!-- サムネイル操作画面（初期は非表示） -->
            <div id="workspace-section" class="workspace-section" style="display: none;">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button id="add-more-btn" class="btn outlined-btn">＋ Add Files</button>
                        <button id="undo-btn" class="btn outlined-btn" disabled>↩ Undo</button>
                        <button id="clear-button" class="btn danger-btn">Clear All</button>
                    </div>
                    <div class="toolbar-right">
                        <button id="save-button" class="btn success-btn">Save PDF</button>
                    </div>
                </div>

                <div id="status" class="status-msg"></div>

                <div id="thumbnail-list" class="thumbnail-list"></div>
            </div>
        </main>

        <!-- ライトボックス（拡大表示）用モーダル -->
        <div id="lightbox" class="lightbox" style="display: none;">
            <span id="lb-close" class="lb-close">&times;</span>
            <button id="lb-prev" class="lb-nav lb-prev">&#10094;</button>
            <img id="lb-img" class="lb-content">
            <button id="lb-next" class="lb-nav lb-next">&#10095;</button>
            <div id="lb-caption"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}?v=3"></script>
</body>

</html>
