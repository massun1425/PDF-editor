<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFeditor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>PDF Editor</h1>
            <p>PDFファイルのアップロードから、直感的なドラッグ＆ドロップでの並び替え・結合・削除</p>
        </header>

        <main>
            <!-- 初期状態のアップロード領域 -->
            <div id="upload-section" class="upload-section">
                <div id="drop-zone" class="drop-zone">
                    <div class="upload-icon">📄</div>
                    <p class="drop-title">PDFファイルをここにドロップ</p>
                    <p class="sub-text">または</p>
                    <button id="select-file-btn" class="btn primary-btn">PDFファイルを選択</button>
                    <!-- 非表示のファイルインプット -->
                    <input type="file" id="pdf-input" accept=".pdf" multiple>
                </div>
            </div>

            <!-- サムネイル操作画面（初期は非表示） -->
            <div id="workspace-section" class="workspace-section" style="display: none;">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button id="add-more-btn" class="btn outlined-btn">＋ 追加</button>
                        <button id="undo-btn" class="btn outlined-btn" disabled>↩ 元に戻す</button>
                        <button id="clear-button" class="btn danger-btn">全てクリア</button>
                    </div>
                    <div class="toolbar-right">
                        <button id="save-button" class="btn success-btn">並び替えて保存</button>
                    </div>
                </div>

                <div id="status" class="status-msg"></div>

                <div id="thumbnail-list" class="thumbnail-list"></div>
            </div>
        </main>

        <!-- ライトボックス（拡大表示）用モーダル -->
        <div id="lightbox" class="lightbox" style="display: none;">
            <span id="lb-close" class="lb-close">&times;</span>
            <button id="lb-prev" class="lb-nav lb-prev">&#10094;</button>
            <img id="lb-img" class="lb-content">
            <button id="lb-next" class="lb-nav lb-next">&#10095;</button>
            <div id="lb-caption"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}?v=3"></script>
</body>

</html>
